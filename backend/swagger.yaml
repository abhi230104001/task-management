openapi: 3.0.0
info:
  title: Task Management API
  description: API for the Task Management System
  version: 1.0.0
servers:
  - url: http://localhost:5000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created successfully
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
  /api/tasks:
    get:
      summary: Get all tasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create a task
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Task created
